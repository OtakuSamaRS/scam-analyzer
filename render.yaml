services:
  - type: web
    name: scam-analyzer-api
    runtime: python
    pythonVersion: 3.11
    
    # Build command
    buildCommand: pip install -r requirements.txt
    
    # Start command - uses PORT env var set by Render
    startCommand: python scam_analyzer.py
    
    # Environment variables
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_BASE_URL
        value: https://api.replicate.com/v1
      - key: LLM_MODEL
        value: meta/llama-2-7b-chat
    
    # Auto-deploy on push
    autoDeploy: true
